<header class="platform-toolbar">
  <a class="platform-brand" routerLink="/dashboard" aria-label="Open Parallax dashboard">
    <img src="assets/logo/lunarchain-icon.png" class="platform-toolbar-logo" alt="Parallax" />
    <span class="platform-brand-title">Parallax</span>
  </a>

  <nav class="platform-actions" aria-label="Platform navigation">
    <a
      *ngFor="let item of navItems"
      class="platform-nav-link"
      [routerLink]="item.route"
      routerLinkActive="platform-nav-link--active"
      [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
      [matTooltip]="item.label">
      <i class="fas" [ngClass]="item.icon" aria-hidden="true"></i>
      <span>{{ item.label }}</span>
    </a>
  </nav>
</header>

<main class="app-shell">
  <router-outlet></router-outlet>
</main>
